# Publish workflow for the PUBLIC repo LumaTrack/n8n-nodes-lumatrack.
# n8n verified nodes must be published from GitHub Actions WITH provenance
# (mandatory since 2026-05-01). Trigger: push a tag like v0.2.0.
#
# npm side: the FIRST publish authenticates with the NPM_TOKEN repo secret
# (npm cannot pre-register a trusted publisher for a never-published package;
# provenance still attaches because this runs in Actions with id-token).
# After v0.3.0 is live: configure a Trusted Publisher on npmjs.com (package
# settings -> Trusted publishing: LumaTrack / n8n-nodes-lumatrack /
# release.yml), revoke the token, delete the secret, and drop the
# NODE_AUTH_TOKEN env below — OIDC then needs no secret at all.
name: Release to npm

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
