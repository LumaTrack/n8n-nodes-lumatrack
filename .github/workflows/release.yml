# Publish workflow for the PUBLIC repo LumaTrack/n8n-nodes-lumatrack.
# n8n verified nodes must be published from GitHub Actions WITH provenance
# (mandatory since 2026-05-01). Trigger: push a tag like v0.3.0.
#
# Auth is OIDC trusted publishing (configured on npmjs.com: package settings
# -> Trusted publishing: LumaTrack / n8n-nodes-lumatrack / release.yml).
# No token, no secret. Two things this depends on:
#   - npm CLI >= 11.5 (Node 22 bundles npm 10, hence the npm upgrade step)
#   - no registry-url on setup-node (it writes an .npmrc that requires a
#     NODE_AUTH_TOKEN env and fails when none is set)
name: Release to npm

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # OIDC trusted publishing + provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
